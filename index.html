<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Toolkit Pro</title>

<link rel="stylesheet" href="css/styles.css">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<header>
  <h1>📄 PDF Toolkit Pro</h1>
  <button onclick="toggleDarkMode()">🌙</button>
</header>

<main>

<div class="dropzone" id="dropzone">
  <p>Drop Word file here or click</p>
  <input type="file" id="file-input" accept=".docx">
</div>

<div id="options">
  <label>Page Size</label>
  <select id="page-size">
    <option value="a4">A4</option>
    <option value="letter">Letter</option>
  </select>
</div>

<button id="convert-btn">Convert to PDF</button>

<div id="loading" class="hidden">Processing...</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

</main>

<script src="js/pdf-tools.js"></script>
<script src="js/main.js"></script>

</body>
</html>
